# configuration for linkchecker for use on site/
[filtering]
checkextern=1
# Ignored URL patterns:
# - Self-links to the deployed site (from sitemap.xml and canonical links):
#   these point at the un-versioned site root, which the mike-versioned
#   gh-pages deployment does not serve. Internal links are still fully
#   checked through their relative file paths in site/.
# - Site-root-absolute paths (from 404.html): these cannot resolve when
#   checking the local site/ directory over file://.
# - anaconda.org intermittently returns 403 to link checkers.
ignore=
  ^https://zuzukin\.github\.io/whl2conda/
  ^file:///whl2conda/
  ^https://anaconda\.org/
